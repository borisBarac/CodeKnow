[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
codeknow-lib = { workspace = true }
codeknow-api = { workspace = true }
codeknow-cli = { workspace = true }

[dependency-groups]
dev = [
    "mypy>=2.0.0",
    "pytest>=9.0.3",
    "ruff>=0.11.0",
    "types-networkx>=3.6.1.20260508",
    "types-openpyxl>=3.1.5.20260508",
]

[tool.ruff]
exclude = ["raw", "plan", ".venv"]

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D100",
    "D101",
    "D102",
    "D103",
    "D107",
    "D205",
    "D400",
    "D401",
    "D417",
    "COM812",
    "ANN401",
    "PLC0415",
    "BLE001",
    "C901",
    "PLR0912",
    "PLR0913",
    "PLR0915",
    "PLR2004",
    "N803",
    "N806",
    "PERF401",
    "RUF001",
    "RUF002",
    "D203",
    "D213",
    "B023",
    "B005",
    "B904",
    "SIM102",
    "SIM115",
    "S110",
    "PLW2901",
    "ERA001",
    "ARG001",
    "ARG002",
    "ASYNC240",
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["ANN001", "ANN201", "ANN202", "INP001", "N802", "S101"]
"e2e/**" = ["ANN001", "ANN201", "ANN202", "INP001", "N802", "S101"]

[tool.pytest.ini_options]
testpaths = ["packages/codeknow-lib/tests"]

[tool.mypy]
python_version = "3.10"
exclude = ["^packages/.*/tests/", "^e2e/"]
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[[tool.mypy.overrides]]
module = ["redis", "redis.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["codeknow.cache.redis"]
disable_error_code = ["arg-type", "assignment", "misc"]
