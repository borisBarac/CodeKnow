[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
codeknow-lib = { workspace = true }
codeknow-api = { workspace = true }
codeknow-cli = { workspace = true }

[dependency-groups]
dev = [
    "mypy>=2.0.0",
    "pytest>=9.0.3",
    "ruff>=0.11.0",
    "types-networkx>=3.6.1.20260508",
    "types-openpyxl>=3.1.5.20260508",
    "fakeredis[lua]>=2.35.0",
    "openapi-python-client>=0.24",
]

[tool.ruff]
exclude = ["raw", "plan", ".venv", "packages/codeknow-cli/generated"]

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D100",
    "D101",
    "D102",
    "D103",
    "D107",
    "D205",
    "D400",
    "D401",
    "D417",
    "COM812",
    "ANN401",
    "PLC0415",
    "BLE001",
    "C901",
    "PLR0912",
    "PLR0913",
    "PLR0915",
    "PLR2004",
    "N803",
    "N806",
    "PERF401",
    "RUF001",
    "RUF002",
    "D203",
    "D213",
    "B023",
    "B005",
    "B904",
    "SIM102",
    "SIM115",
    "S110",
    "PLW2901",
    "ERA001",
    "ARG001",
    "ARG002",
    "ASYNC240",
    "FBT001",
    "FBT002",
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["ANN001", "ANN201", "ANN202", "INP001", "N802", "S101", "SLF001"]
"e2e/**" = ["ANN001", "ANN201", "ANN202", "INP001", "N802", "S101", "SLF001"]

[tool.pytest.ini_options]
testpaths = ["packages/codeknow-lib/tests"]
pythonpath = ["e2e"]
markers = ["llm_judge: requires JUDGE_LLM_API_KEY or OPENROUTER_API_KEY"]

[tool.mypy]
python_version = "3.10"
exclude = ["^packages/.*/tests/", "^e2e/", "^packages/codeknow-cli/generated/"]
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[[tool.mypy.overrides]]
module = ["tests.*", "*.tests.*", "e2e.*", "e2e", "e2e.*.*"]
disallow_untyped_defs = false
disallow_untyped_calls = false
disallow_incomplete_defs = false
check_untyped_defs = false
allow_untyped_defs = true
allow_untyped_calls = true
ignore_errors = true

[[tool.mypy.overrides]]
module = ["redis", "redis.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["daemonocle", "daemonocle.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["codeknow.cache.redis"]
disable_error_code = ["arg-type", "assignment", "misc"]

[[tool.mypy.overrides]]
module = ["openapi_python_client", "openapi_python_client.*"]
ignore_missing_imports = true
