[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "codeknow-cli"
version = "0.1.0"
description = "User-facing CLI client for the codeknow API"
requires-python = ">=3.10,<3.14"
dependencies = [
    "click>=8.2",
    "daemonocle>=1.1",
    "rich>=13.0",
    "code-know-api-client",
    "langchain",
    "langchain-openai",
    "pydantic-settings",
]

[project.scripts]
codeknow = "codeknow_cli.main:main"

[tool.hatch.build.targets.wheel]
packages = ["src/codeknow_cli"]

[tool.uv.sources]
code-know-api-client = { path = "./generated" }
